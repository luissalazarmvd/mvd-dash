<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard</title>
<style>
  :root{
    --bg:#f5f7fb;
    --card:#fff;
    --ink:#0b2b3a;
    --muted:#6c757d;
    --blue:rgb(0,103,172);
  }
  html,body{height:100%}
  body{
    margin:0;
    background:var(--bg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink);
  }
  .card{
    width:min(420px,92vw);
    background:var(--card);
    border-radius:14px;
    padding:24px;
    box-shadow:0 12px 32px rgba(0,0,0,.08);
  }
  h1{
    margin:0 0 18px 0;
    text-align:center;
    font-size:1.1rem;
    font-weight:900;
  }
  .row{
    display:flex;
    gap:10px;
  }
  input{
    flex:1;
    height:42px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,.15);
    padding:0 12px;
    font-size:1rem;
    font-weight:700;
    outline:none;
  }
  input:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(0,103,172,.15);
  }
  button{
    height:42px;
    border-radius:10px;
    border:0;
    background:var(--blue);
    color:#fff;
    font-weight:800;
    padding:0 16px;
    cursor:pointer;
  }
  button:disabled{
    opacity:.6;
    cursor:not-allowed;
  }
  .hint{
    margin-top:12px;
    text-align:center;
    font-size:.85rem;
    color:var(--muted);
  }
  .error{
    margin-top:10px;
    text-align:center;
    font-size:.85rem;
    color:#b00020;
    display:none;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Dashboard access</h1>

    <div class="row">
      <input id="pin" type="password" placeholder="PIN" autocomplete="current-password" />
      <button id="btn">Enter</button>
    </div>

    <div class="hint">To view the dashboard.</div>
    <div class="error" id="error"></div>
  </div>

<script>
(function(){

  const pinInput = document.getElementById("pin");
  const btn = document.getElementById("btn");
  const errorBox = document.getElementById("error");

  function qToken(){
    const p = new URLSearchParams(location.search);
    const t = (p.get("t") || "").trim();
    return t ? ("?t=" + encodeURIComponent(t)) : "";
  }

  function showError(msg){
    errorBox.textContent = msg;
    errorBox.style.display = msg ? "block" : "none";
  }

  async function login(){
    showError("");
    const pin = (pinInput.value || "").trim();

    if(!pin){
      showError("Enter PIN.");
      pinInput.focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = "Checking...";

    try{
      const res = await fetch("/api/auth" + qToken(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ pin })
      });

      if(!res.ok){
        let msg = "Unauthorized";
        try{
          const data = await res.json();
          if(data.detail) msg = data.detail;
        }catch(_){}
        throw new Error(msg);
      }

      window.location.href = "/dash" + qToken();

    }catch(err){
      showError(err.message || "Login error");
    }finally{
      btn.disabled = false;
      btn.textContent = "Enter";
    }
  }

  btn.addEventListener("click", login);

  pinInput.addEventListener("keydown", function(e){
    if(e.key === "Enter") login();
  });

  pinInput.focus();

})();
</script>
</body>
</html>
